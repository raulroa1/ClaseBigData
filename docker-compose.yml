x-spark-common: &spark-common
  image: spark:3.5.7-scala2.12-java17-python3-ubuntu
  networks:
    - bigdata-net
  restart: unless-stopped

services:
  jupyter-spark:
    build:
      context: ./docker/jupyter-spark
      dockerfile: Dockerfile
    container_name: bigdata-jupyter
    profiles: ["basico", "completo"]
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-bigdata2026}
      - SPARK_MASTER=spark://spark-master:7077
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./datos:/home/jovyan/datos
      - ./scripts:/home/jovyan/scripts
      - jupyter-work:/home/jovyan/work
    networks:
      - bigdata-net
    depends_on:
      - spark-master
    restart: unless-stopped

  spark-master:
    <<: *spark-common
    container_name: bigdata-spark-master
    profiles: ["basico", "completo"]
    ports:
      - "${SPARK_MASTER_WEBUI_PORT:-8080}:8080"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master

  spark-worker:
    <<: *spark-common
    container_name: bigdata-spark-worker
    profiles: ["basico", "completo"]
    ports:
      - "${SPARK_WORKER_WEBUI_PORT:-8081}:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2g}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    depends_on:
      - spark-master

  # ... resto de servicios ...

networks:
  bigdata-net:
    driver: bridge

volumes:
  jupyter-work:
  postgres-data: